<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Story</title>
  <link rel="stylesheet" href="templates.css">
  <style>
    body { margin: 0; padding: 0; background: #000; }
    .scaled { transform: scale(0.2); transform-origin: top left; width: 500%; height: 500%; }
  </style>
</head>
<body>
  <div class="scaled">
    <!-- Story variant 1: Question hook -->
    <div class="template-instagram-story social-template" style="position:relative; padding:100px 60px;">
      <div style="position:absolute; top:60px; left:60px; font-size:20px; font-weight:600; color:var(--clt-x-pj-gold); letter-spacing:2px;">CLT x PJ</div>
      <div style="margin-top:200px;">
        <div class="headline" style="font-size:80px; text-align:left;">CLT<br>ou<br>PJ?</div>
        <div style="width:80px; height:4px; background:var(--clt-x-pj-gold); margin:40px 0;"></div>
        <div class="body" style="font-size:32px; text-align:left; color:var(--clt-x-pj-text-secondary); line-height:1.6;">Descubra qual proposta vale mais a pena para sua carreira em 2 minutos.</div>
      </div>
      <div style="position:absolute; bottom:120px; left:60px; right:60px;">
        <div class="cta" style="width:100%; text-align:center; padding:24px; font-size:28px;">↑ Deslize para cima</div>
      </div>
    </div>
  </div>
</body>
</html>
