<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Post</title>
  <link rel="stylesheet" href="templates.css">
  <style>
    body { margin: 0; padding: 0; background: #000; }
    .scaled { transform: scale(0.25); transform-origin: top left; width: 400%; height: 400%; }
  </style>
</head>
<body>
  <div class="scaled">
    <!-- LinkedIn variant 1: Data comparison -->
    <div class="template-linkedin-post social-template">
      <div class="content">
        <div class="tag" style="font-size:18px; letter-spacing:2px; margin-bottom:20px;">#Carreira #RH #CLT #PJ</div>
        <div class="headline" style="font-size:44px; line-height:1.15; margin-bottom:24px;">Reforma Tributária 2026:<br>Como afeta sua decisão CLT vs PJ</div>
        <div class="body" style="font-size:22px; line-height:1.6; color:var(--clt-x-pj-text-secondary);">As novas regras de IR mudam o cálculo. Antes de aceitar qualquer proposta, compare o valor real — não apenas o bruto.</div>
      </div>
      <div class="visual" style="display:flex; flex-direction:column; align-items:center; justify-content:center; border:3px solid var(--clt-x-pj-gold); border-radius:20px; padding:30px; gap:12px;">
        <div style="font-size:48px; font-weight:700; color:var(--clt-x-pj-gold);">R$ 1.3k</div>
        <div style="font-size:18px; color:var(--clt-x-pj-text-secondary);">diferença/mês</div>
        <div style="font-size:16px; color:var(--clt-x-pj-text-muted); margin-top:8px;">CLT x PJ</div>
      </div>
    </div>
  </div>
</body>
</html>
