<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Post - Single Image</title>
  <link rel="stylesheet" href="templates.css">
  <style>
    body { margin: 0; padding: 0; background: #000; }
    .scaled { transform: scale(0.2); transform-origin: top left; width: 500%; height: 500%; }
  </style>
</head>
<body>
  <div class="scaled">
    <!-- Post variant 1: Hero comparison -->
    <div class="template-instagram-post social-template" style="position:relative; overflow:hidden;">
      <div style="position:absolute; top:40px; left:80px; font-size:24px; font-weight:600; color:var(--clt-x-pj-gold); letter-spacing:2px;">CLARIDADE</div>
      <div style="margin-top:180px;">
        <div class="headline" style="font-size:56px; line-height:1.15;">Sua proposta CLT<br>vale mais do que<br>você pensa</div>
        <div style="display:flex; gap:40px; margin-top:60px; justify-content:center;">
          <div style="text-align:center;">
            <div style="font-size:72px; font-weight:700; color:var(--clt-x-pj-gold);">R$ 8.5k</div>
            <div style="font-size:22px; color:var(--clt-x-pj-text-secondary); margin-top:8px;">CLT real</div>
          </div>
          <div style="display:flex; align-items:center; font-size:48px; color:var(--clt-x-pj-text-muted);">vs</div>
          <div style="text-align:center;">
            <div style="font-size:72px; font-weight:700; color:var(--clt-x-pj-text-muted);">R$ 7.2k</div>
            <div style="font-size:22px; color:var(--clt-x-pj-text-muted); margin-top:8px;">PJ real</div>
          </div>
        </div>
      </div>
      <div class="cta" style="margin-top:auto; font-size:24px; padding:16px 32px; border:2px solid var(--clt-x-pj-gold); border-radius:12px;">Comparar proposta →</div>
    </div>
  </div>
</body>
</html>
