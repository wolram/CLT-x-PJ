[build]
  publish = "."
  command = "cd admin && npm install && npm run build"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/admin/*"
  to = "/admin-dist/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin-dist/index.html"
  status = 200
